name: Valencia Cinema Weekly Newsletter

on:
  # Every Thursday at 19:00 Valencia time (18:00 UTC in winter, 17:00 UTC in summer)
  # Using 17:00 UTC which covers BST/CEST — adjust if needed
  schedule:
    - cron: "0 17 * * 4"   # 4 = Thursday

  # Allow manual trigger from GitHub Actions UI (useful for testing)
  workflow_dispatch:

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper and send email
        env:
          SMTP_HOST:     ${{ secrets.SMTP_HOST }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_ADDRESS:  ${{ secrets.FROM_ADDRESS }}
          FROM_NAME:     ${{ secrets.FROM_NAME }}
          RECIPIENTS:    ${{ secrets.RECIPIENTS }}
        run: python scraper.py
