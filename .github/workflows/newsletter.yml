name: Valencia Cinema Weekly Newsletter

on:
  schedule:
    - cron: "5 23 * * *"   # Every day at 23:05 UTC (00:05 Valencia time), email only on Thursdays
  workflow_dispatch:         # Allow manual trigger for testing

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Needed to push docs/index.html back to repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies for Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 libatk-bridge2.0-0 libatk1.0-0 libcups2 \
            libdbus-1-3 libdrm2 libgbm1 libgtk-3-0 libnspr4 libnss3 \
            libxcomposite1 libxdamage1 libxfixes3 libxkbcommon0 libxrandr2 xvfb

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium

      - name: Run scraper — build page and send email
        env:
          SMTP_HOST:     ${{ secrets.SMTP_HOST }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_ADDRESS:  ${{ secrets.FROM_ADDRESS }}
          FROM_NAME:     ${{ secrets.FROM_NAME }}
          RECIPIENTS:    ${{ secrets.RECIPIENTS }}
          LISTINGS_URL:  ${{ secrets.LISTINGS_URL }}
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON:         ${{ secrets.SUPABASE_ANON }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
          TMDB_API_KEY:          ${{ secrets.TMDB_API_KEY }}
          TRIGGERED_BY:          ${{ github.event_name }}
        run: python scraper.py

      - name: Publish listings page to GitHub Pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/listings/ docs/preferences/index.html docs/data/stats.json
          git diff --staged --quiet || git commit -m "chore: update listings $(date +%Y-%m-%d)"
          git push
