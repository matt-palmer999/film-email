name: Valencia Cinema Dev Build

on:
  push:
    branches: [ dev ]
  workflow_dispatch:
    inputs:
      FORCE_EMAIL:
        description: 'Force email send (true/false)'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v3
        with:
          ref: dev

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright requests beautifulsoup4
          playwright install chromium

      - name: Run scraper
        env:
          SMTP_HOST:      ${{ secrets.SMTP_HOST }}
          SMTP_PORT:      ${{ secrets.SMTP_PORT }}
          SMTP_USER:      ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:  ${{ secrets.SMTP_PASSWORD }}
          FROM_ADDRESS:   ${{ secrets.FROM_ADDRESS }}
          FROM_NAME:      ${{ secrets.FROM_NAME }}
          RECIPIENTS:     ${{ secrets.RECIPIENTS }}
          LISTINGS_URL:   "https://matt-palmer999.github.io/whatson-movie-dev/listings"
          TMDB_API_KEY:   ${{ secrets.TMDB_API_KEY }}
          SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON:  ${{ secrets.SUPABASE_ANON }}
          FORCE_EMAIL:    ${{ github.event.inputs.FORCE_EMAIL || 'false' }}
        run: python scraper.py

      - name: Publish dev listings to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          destination_dir: .
          publish_branch: gh-pages-dev
